# Database configuration for Quarkus application
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=autoflex
quarkus.datasource.password=autoflex123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/autoflex_db

# Flyway configuration for migrations
quarkus.flyway.migrate-at-start=true

# Hibernate configuration
# Disable Hibernate automatic generation to use flyway
quarkus.hibernate-orm.database.generation=none


# Enable CORS
quarkus.http.cors.enabled=true
# CORS configuration
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

quarkus.security.auth.anonymous-enabled=true
quarkus.http.auth.permission.public.paths=/api/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.methods=OPTIONS
