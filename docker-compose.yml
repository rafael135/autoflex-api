services:
  database:
    image: postgres:15-alpine
    container_name: autoflex-database
    environment:
      POSTGRES_USER: autoflex
      POSTGRES_PASSWORD: autoflex123
      POSTGRES_DB: autoflex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoflex -d autoflex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: